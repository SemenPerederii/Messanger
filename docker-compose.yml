version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: chat_sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=MyStr0ng!Pass2026
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  backend:
    build:
      context: ./Backend/ChatAPI/ChatAPI
      dockerfile: Dockerfile
    container_name: chat_backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ChatDb;User=sa;Password=MyStr0ng!Pass2026;TrustServerCertificate=True;
    depends_on:
      - sqlserver

  frontend:
    build:
      context: ./Frontend/ChatAngular
      dockerfile: Dockerfile
    container_name: chat_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  sql_data:
